<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenhando com Canvas</title>
</head>
<body>
    <h1 style="color: blueviolet;">Canvas</h1>
    <canvas id="canvas" height="1080px" width="920px" style="border:2px solid black;"></canvas>

    <script>
        let ctx = canvas.getContext("2d")
        var mouseEvent;
        desenhando = false;
        
        canvas.addEventListener("mousedown", (evento)=>{
            desenhando = true;
            ctx.moveTo(evento.offsetX, evento.offsetY)
        })
        canvas.addEventListener("mouseup", ()=>{
            desenhando =false
        })


        canvas.addEventListener("mousemove", (evento)=>{
            mouseEvent=evento
            if(desenhando){
                ctx.lineTo(evento.offsetX,evento.offsetY)
                ctx.stroke();
            }
        })

    </script>
    
</body>
</html>
