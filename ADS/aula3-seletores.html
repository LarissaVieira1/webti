<head>

    <title>seletores</title>
    <style>
        *{border: 1px solid black;}
        dd{border: 1px solid magenta;}
    </style>
</head>
<body>
    <h1>Seletores CSS</h1>
    <dl>
        <dt>Seletor Universal</dt>
        <dd>* Seletor universal seleciona todos elementos, especifidade baixa</dd>

        <dt style="border: 5px solid green;">CSS INLINE</dt>
        <dd></dd>

        <dt>Seletor Identidenticador</dt>
        <dd>Nome da tag - mais especifico que o seletor universal e menos que o css inline</dd>

    </dl>
    
</body>
</html>
