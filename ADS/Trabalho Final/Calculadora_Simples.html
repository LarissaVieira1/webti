<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora_Simples</title>
    <link rel="stylesheet" href="Calculadora_Simples.css">
</head>
<body>
  <div class="calculadora">
    <div class="tela" id="tela">0</div>
    <div class="botoes">
      <button class="operador" onclick="add('+')">+</button>
      <button class="operador" onclick="add('-')">-</button>
      <button class="operador" onclick="add('*')">×</button>
      <button class="operador" onclick="add('/')">÷</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button class="igual" onclick="calcular()">=</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>

      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button></button>
      <button class="ac" onclick="limpar()">AC</button>
    </div>
  </div>
  <script src="Calculadora_Simples.js"></script>
</body>
</html>
