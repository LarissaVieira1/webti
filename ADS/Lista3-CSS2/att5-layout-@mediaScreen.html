<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
}

.container{
    display:grid;
    width:100vw;
    height:100vh;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(5,1fr);
}

.topo{
    background:#f4b02a;
    grid-column:1 / 5;
}

.topo-direita{
    background:#c7d8d7;
    grid-column:5 / 6;
}

.esquerda{
    background:#f79a67;
    grid-area:2 / 1 / 6 / 4;
}

.direita{
    grid-area:2 / 4 / 6 / 6;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr 1fr 1fr 1fr;
}

.circulos{
    grid-column:1 / 3;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.circulo{
    width:27px;
    height:27px;
    border-radius:50%;
}

#c1{
    background:#b6d46b;
}

#c2{
    background:#d6b7c4;
}

#c3{
    background:#bdb5c9;
}

#c4{
    background:#f3b300;
}

.roxo{
    background:#b9adc9;
    grid-row:2 / 4;
}

.rosa{
    background:#efd1cb;
    grid-row:4 / 6;
}

.verde{
    background:#b8d36b;
    grid-row:2 / 6;
    grid-column:2;
}

@media screen and (max-width:500px){

    .container{
        grid-template-columns:1fr;
        grid-template-rows:100px 100px 1fr 1fr;
    }

    .topo{
        grid-column:1;
        grid-row:1;
    }

    .topo-direita{
        grid-column:1;
        grid-row:2;
    }

    .esquerda{
        grid-column:1;
        grid-row:3;
    }

    .direita{
        grid-column:1;
        grid-row:4;

        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:auto 1fr 1fr;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="topo"></div>

    <div class="topo-direita"></div>

    <div class="esquerda"></div>

    <div class="direita">

        <div class="circulos">
            <div class="circulo" id="c1"></div>
            <div class="circulo" id="c2"></div>
            <div class="circulo" id="c3"></div>
            <div class="circulo" id="c4"></div>
        </div>

        <div class="roxo"></div>

        <div class="rosa"></div>

        <div class="verde"></div>

    </div>

</div>

</body>
</html>
