<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slide Show com Flex</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f4f4;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    display:flex;
    width:90%;
    max-width:1200px;
    height:400px;
    gap:15px;
}

.foto{
    flex:1;
    position:relative;
    overflow:hidden;
    border-radius:25px;
    transition:flex .5s ease;
    cursor:pointer;
}

.foto.main{
    flex:3;
}

.container:hover .foto.main{
    flex:1;
}

.foto:hover{
    flex:5;
}

.foto img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    padding:15px;
    color:white;
    background:linear-gradient(transparent,rgba(0,0,0,.8));
}
</style>

</head>

<body>

<div class="container">

    <div class="foto">
        <img src="imagens/AdamSandler.jpeg" alt="Adam Sandler">
    </div>

    <div class="foto main">
        <img src="imagens/CachaçaPreciosa.jpeg" alt="">
        <div class="info">
            <strong>Smeago</strong><br>
            <small>
                "A cerveja e a cachaça são os piores inimigos do homem.
                Mas o homem que foge dos seus inimigos é um covarde."
            </small>
        </div>
    </div>

    <div class="foto">
        <img src="imagens/Bolsonarorebaixado.jpeg" alt="">
    </div>

    <div class="foto">
        <img src="imagens/JustinJackson.jpeg" alt="">
    </div>

</div>

</body>
</html>
