<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bandeiras</title>

    <style>
        .container{
            display: flex;
            gap: 10px;
        }

        .bandeira{
            width: 200px;
            height: 150px;
            border: 1px solid black;
        }

        #japao.bandeira{
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vermelhoj{
            width: 80px;
            height: 80px;
            background-color: red;
            border-radius: 100%;
        }
        
        #alemanha.bandeira{
            display: block;
        }

        .pretoa{
            width: 200px;
            height: 50px;
            background-color: black;
        }

        .vermelhoa{
            width: 200px;
            height: 50px;
            background-color: red;
        }

        .amareloa{
            width: 200px;
            height: 50px;
            background-color: gold;
        }

        #holanda.bandeira{
            display: block;
        }

        .vermelhoh{
            width: 200px;
            height: 50px;
            background-color: red;
        }

        .brancoh{
            width: 200px;
            height: 50px;
            background-color: white;
        }

        .azulh{
            width: 200px;
            height: 50px;
            background-color: blue;
        }

        #italia.bandeira{
            display: flex;
        }

        .verdei{
            width: 66.6px;
            height: 150px;
            background-color: green;
        }

        .brancoi{
            width: 66.6px;
            height: 150px;
            background-color: white;
        }

        .vermelhoi{
            width: 66.6px;
            height: 150px;
            background-color: red;
        }

        #brasil.bandeira{
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .amarelob{
            width: 90px;
            height: 90px;
            background-color: yellow;
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .azulb{
            width: 55px;
            height: 55px;
            background-color: blue;
            border-radius: 100%;
            transform: rotate(-45deg);
        }

    </style>

</head>
<body>

<div class="container">

    <div class="bandeira" id="japao">
        <div class="vermelhoj"></div>
    </div>

    <div class="bandeira" id="alemanha">
        <div class="pretoa"></div>
        <div class="vermelhoa"></div>
        <div class="amareloa"></div>
    </div>

    <div class="bandeira" id="holanda">
        <div class="vermelhoh"></div>
        <div class="brancoh"></div>
        <div class="azulh"></div>
    </div>

    <div class="bandeira" id="italia">
        <div class="verdei"></div>
        <div class="brancoi"></div>
        <div class="vermelhoi"></div>
    </div>

    <div class="bandeira" id="brasil">
        <div class="amarelob">
            <div class="azulb"></div>
        </div>
    </div>

</div>

</body>
</html>
