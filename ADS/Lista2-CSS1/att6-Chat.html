<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atividade 6</title>

    <style>
        .chat{
            width:400px;
            margin:40px auto;
            border:1px solid #ccc;
            border-radius:6px;
            background:white;
            padding:8px;
        }
        .mensagem{
            position:relative;
            width:75%;
            min-height:60px;
            border:1px solid #ccc;
            border-radius:4px;
            margin:10px 0;
            padding:20px 45px;
        }

        .esquerda{
            float:left;
            background:white;
        }

        .direita{
            float:right;
            background:#d8ffd8;
        }

        .nome{
            position:absolute;
            top:3px;
            left:10px;
            color:gray;
            font-size:12px;
        }

        .direita .nome{
            left:10px;
        }

        .foto{
            width:30px;
            position:absolute;
            bottom:10px;
        }

        .esquerda .foto{
            left:8px;
        }

        .direita .foto{
            right:8px;
        }

        .hora{
            position:absolute;
            bottom:5px;
            right:10px;
            color:gray;
            font-size:11px;
        }

        .mensagem p{
            text-align:center;
            font-size:22px;
            margin:0;
        }

        .entrada{
            clear:both;
            margin-top:20px;
        }

        textarea{
            width:100%;
            height:90px;
            resize:none;
            font-size:18px;
        }

        button{
            float:right;
            margin-top:5px;
        }
    </style>
</head>
<body>

    <div class="chat">
        <div class="mensagem esquerda">
            <span class="nome">Fura olho</span>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="foto">
            <p>Mano,tô apaixonado o que eu faço?</p>
            <span class="hora">00:50</span>
        </div>

        <div class="mensagem direita">
            <span class="nome">Eu</span>
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="foto">
            <p>Fala com ela cara.</p>
            <span class="hora">00:55</span>
        </div>

        <div class="mensagem esquerda">
            <span class="nome">fura olho</span>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="foto">
            <p> Fala você pra mim</p>
            <span class="hora">01:01</span>
        </div>

        <div class="mensagem direita">
            <span class="nome">Eu</span>
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="foto">
            <p>Pq eu ?</p>
            <span class="hora">00:55</span>
        </div>

        <div class="mensagem esquerda">
            <span class="nome">fura olho</span>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="foto">
            <p>Pq ela é sua namorada,vc tem mais intimidade!</p>
            <span class="hora">01:01</span>
        </div>

        <div class="mensagem direita">
            <span class="nome">Eu</span>
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="foto">
            <p>Criatura...</p>
            <span class="hora">00:55</span>
        </div>

        <div class="entrada">
            <textarea placeholder="Digite sua mensagem"></textarea>
            <button>Enviar</button>
        </div>
    </div>

</body>
</html>
