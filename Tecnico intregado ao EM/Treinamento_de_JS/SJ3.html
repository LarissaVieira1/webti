<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de clicks</title>
    <style>
        body {
            display: flex;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <button id="botao">Clica em mim!</button>
    <script>
        let meuBotao = document.querySelector("#botao")
        let i = 0;
        meuBotao.addEventListener("click", ()=>{
            meuBotao.innerHTML = i;
            i++
        })
    </script>
</body>
</html>
